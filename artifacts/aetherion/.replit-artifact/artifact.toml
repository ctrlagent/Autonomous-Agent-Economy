kind = "web"
previewPath = "/"
title = "AETHERION"
version = "1.0.0"
id = "artifacts/aetherion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "BASE_PATH=/ PORT=8080 pnpm --filter @workspace/aetherion dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aetherion", "run", "build" ]
publicDir = "artifacts/aetherion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8080"
BASE_PATH = "/"
